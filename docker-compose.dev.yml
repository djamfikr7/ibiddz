services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile.dev
    container_name: ibiddz-api-dev
    restart: unless-stopped
    environment:
      NODE_ENV: development
      PORT: 3001
      DATABASE_URL: postgresql://ibiddz:ibiddz_dev@postgres:5432/ibiddz?schema=public
      REDIS_URL: redis://redis:6379
      JWT_SECRET: dev_jwt_secret_do_not_use_in_production
      JWT_ACCESS_EXPIRY: 15m
      JWT_REFRESH_EXPIRY: 7d
      CORS_ORIGINS: http://localhost:3000,http://localhost:8080
      LOG_LEVEL: debug
      LOG_FORMAT: pretty
    ports:
      - "3001:3001"
      - "9229:9229"
    volumes:
      - ./apps/api/src:/app/apps/api/src
      - ./apps/api/test:/app/apps/api/test
      - ./packages/shared/src:/app/packages/shared/src
      - ./packages/db/src:/app/packages/db/src
      - api_node_modules:/app/apps/api/node_modules
      - shared_node_modules:/app/packages/shared/node_modules
      - db_node_modules:/app/packages/db/node_modules
      - root_node_modules:/app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - ibiddz-network
    command: npx nest start --watch --debug 0.0.0.0:9229

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile.dev
    container_name: ibiddz-web-dev
    restart: unless-stopped
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_API_URL: http://localhost:3001/v1
      NEXT_PUBLIC_WS_URL: ws://localhost:3001
      NEXT_PUBLIC_APP_URL: http://localhost:3000
    ports:
      - "3000:3000"
      - "9230:9230"
    volumes:
      - ./apps/web/src:/app/apps/web/src
      - ./apps/web/public:/app/apps/web/public
      - ./packages/shared/src:/app/packages/shared/src
      - ./packages/ui/src:/app/packages/ui/src
      - web_node_modules:/app/apps/web/node_modules
      - shared_node_modules:/app/packages/shared/node_modules
      - ui_node_modules:/app/packages/ui/node_modules
      - root_node_modules:/app/node_modules
    depends_on:
      - api
    networks:
      - ibiddz-network
    command: npm run dev -- --port 3000

  postgres:
    ports:
      - "5432:5432"

  redis:
    ports:
      - "6379:6379"

  adminer:
    ports:
      - "8080:8080"

  redis-commander:
    ports:
      - "8081:8081"

volumes:
  api_node_modules:
  web_node_modules:
  shared_node_modules:
  db_node_modules:
  ui_node_modules:
  root_node_modules:
