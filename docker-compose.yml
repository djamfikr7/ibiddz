services:
  postgres:
    image: postgres:15-alpine
    container_name: ibiddz-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ibiddz
      POSTGRES_USER: ibiddz
      POSTGRES_PASSWORD: ibiddz_dev
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ibiddz -d ibiddz"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - ibiddz-network

  redis:
    image: redis:7-alpine
    container_name: ibiddz-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 128mb --maxmemory-policy allkeys-lru
    ports:
      - "6381:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      - ibiddz-network

  adminer:
    image: adminer:latest
    container_name: ibiddz-adminer
    restart: unless-stopped
    ports:
      - "8082:8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - ibiddz-network

  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: ibiddz-redis-commander
    restart: unless-stopped
    environment:
      REDIS_HOSTS: local:redis:6379
    ports:
      - "8083:8081"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - ibiddz-network

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: ibiddz-api
    restart: unless-stopped
    env_file:
      - .env.staging
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgresql://ibiddz:ibiddz_dev@postgres:5432/ibiddz?schema=public
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET}
      JWT_ACCESS_EXPIRY: ${JWT_ACCESS_EXPIRY}
      JWT_REFRESH_EXPIRY: ${JWT_REFRESH_EXPIRY}
      CORS_ORIGINS: ${CORS_ORIGINS}
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET}
      STORAGE_PROVIDER: ${STORAGE_PROVIDER}
      SMS_PROVIDER: ${SMS_PROVIDER}
    ports:
      - "3002:3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3001/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - ibiddz-network

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    container_name: ibiddz-web
    restart: unless-stopped
    env_file:
      - .env.staging
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
      NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL}
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3000 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - ibiddz-network

volumes:
  pgdata:
    driver: local
  redisdata:
    driver: local

networks:
  ibiddz-network:
    driver: bridge
